name: Build & Release

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

# Prevent overlapping releases from racing on the version bump / tag push.
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --omit=optional

      - name: Lint
        run: npm run lint

      - name: Compile
        run: npm run compile

      - name: Package extension (.vsix)
        run: npm run package -- --out gitlinediff.vsix

      - name: Upload .vsix artifact
        uses: actions/upload-artifact@v6
        with:
          name: gitlinediff-vsix
          path: gitlinediff.vsix
          if-no-files-found: error

  release:
    # Auto-bump, tag, and attach the .vsix to a GitHub Release on pushes to main.
    # Does NOT publish to the VS Code Marketplace.
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --omit=optional

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Bump patch version & create tag
        run: |
          npm version patch -m "ci: release v%s [skip ci]"

      - name: Read new version
        id: version
        run: echo "tag=v$(node -p "require('./package.json').version")" >> "$GITHUB_OUTPUT"

      - name: Package extension (.vsix)
        run: npm run package -- --out "gitlinediff-${{ steps.version.outputs.tag }}.vsix"

      - name: Push version bump & tag
        run: git push --follow-tags origin HEAD:main

      - name: Create GitHub Release with .vsix
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ steps.version.outputs.tag }}" \
            "gitlinediff-${{ steps.version.outputs.tag }}.vsix" \
            --title "${{ steps.version.outputs.tag }}" \
            --generate-notes
